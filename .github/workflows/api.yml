name: API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/api.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run lint --filter=@ridelogger/api --filter=@ridelogger/routing

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run test

  deploy:
    name: Deploy API to Lambda
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npx turbo run build --filter=@ridelogger/api

      - name: Run DB migrations
        run: |
          FLYWAY_URL=$(aws ssm get-parameter \
            --name /ridelogger/production/flyway-url \
            --query Parameter.Value --output text --region $AWS_REGION)
          DB_USER=$(aws ssm get-parameter \
            --name /ridelogger/production/database-user \
            --query Parameter.Value --output text --region $AWS_REGION)
          DB_PASS=$(aws ssm get-parameter \
            --name /ridelogger/production/database-password \
            --with-decryption --query Parameter.Value --output text --region $AWS_REGION)
          docker run --rm \
            -v ${{ github.workspace }}/db/migrations:/flyway/sql \
            -e FLYWAY_URL="$FLYWAY_URL" \
            -e FLYWAY_USER="$DB_USER" \
            -e FLYWAY_PASSWORD="$DB_PASS" \
            flyway/flyway:10-alpine migrate

      - name: Upload to S3
        run: |
          aws s3 cp apps/api/dist/api.zip \
            s3://ridelogger-deployments-442090781375/api-${{ github.sha }}.zip \
            --region $AWS_REGION

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file apps/api/infrastructure.yml \
            --stack-name ridelogger \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --region $AWS_REGION \
            --parameter-overrides \
              DeploymentBucket=ridelogger-deployments-442090781375 \
              LambdaS3Key=api-${{ github.sha }}.zip
